name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate new version
        id: version
        run: |
          CURRENT=$(jq -r '.version' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ github.event.inputs.bump_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping version: $CURRENT -> $NEW_VERSION"

      - name: Update package.json version
        run: |
          jq --arg v "${{ steps.version.outputs.new }}" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - name: Prepend changelog entry
        run: |
          VERSION="${{ steps.version.outputs.new }}"
          DATE=$(date +%Y-%m-%d)

          LINE=$(grep -n '^## \[' CHANGELOG.md | head -1 | cut -d: -f1) || true
          if [ -z "$LINE" ]; then
            echo "::error::No existing '## [version]' section found in CHANGELOG.md"
            exit 1
          fi

          {
            head -n "$((LINE - 1))" CHANGELOG.md
            printf '## [%s] - %s\n\n' "$VERSION" "$DATE"
            printf '%s\n\n' "### Added" "### Changed" "### Fixed"
            echo ""
            tail -n "+$LINE" CHANGELOG.md
          } > CHANGELOG.md.new && mv CHANGELOG.md.new CHANGELOG.md

      - name: Commit and tag
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin "HEAD:refs/heads/${DEFAULT_BRANCH}" --tags

      - name: Extract changelog for new version
        run: |
          VERSION="${{ steps.version.outputs.new }}"
          CHANGELOG=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG" ]; then
            echo "::error::No changelog section found for version $VERSION."
            exit 1
          fi

          echo "$CHANGELOG" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.new }}"
          name: "v${{ steps.version.outputs.new }}"
          body_path: release_notes.md

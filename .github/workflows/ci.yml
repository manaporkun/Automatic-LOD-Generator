name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Validate Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate package.json
        run: |
          if [ ! -f "package.json" ]; then
            echo "::error::package.json not found"
            exit 1
          fi

          # Validate JSON syntax
          jq empty package.json || { echo "::error::package.json is not valid JSON"; exit 1; }

          # Check required fields
          for field in name version displayName unity; do
            val=$(jq -r ".$field" package.json)
            if [ "$val" = "null" ] || [ -z "$val" ]; then
              echo "::error::package.json missing required field: $field"
              exit 1
            fi
          done

          echo "package.json is valid"

      - name: Validate assembly definitions
        run: |
          ASMDEF="Editor/Plugins.AutoLODGenerator.Editor.asmdef"
          if [ ! -f "$ASMDEF" ]; then
            echo "::error::Assembly definition not found"
            exit 1
          fi
          jq empty "$ASMDEF" || { echo "::error::asmdef is not valid JSON"; exit 1; }
          echo "Assembly definitions are valid"

      - name: Check version consistency
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          echo "Package version: $PKG_VERSION"

          CHANGELOG_FIRST=""
          while IFS= read -r line || [ -n "$line" ]; do
            if [[ "$line" =~ ^##[[:space:]]+\[([^]]+)\] ]]; then
              ver="${BASH_REMATCH[1]}"
              if [ "$ver" != "Unreleased" ]; then
                CHANGELOG_FIRST="$ver"
                break
              fi
            fi
          done < CHANGELOG.md

          if [ -z "$CHANGELOG_FIRST" ]; then
            echo "::error::No version heading (## [x.y.z]) found in CHANGELOG.md"
            exit 1
          fi

          if [ "$CHANGELOG_FIRST" != "$PKG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) must match the first non-Unreleased section in CHANGELOG.md ($CHANGELOG_FIRST)."
            exit 1
          fi

      - name: Validate .meta files exist for source files
        run: |
          MISSING=0

          # Check that every .cs and .asmdef file has a corresponding .meta file
          while IFS= read -r -d '' file; do
            if [ ! -f "${file}.meta" ]; then
              echo "::error::Missing .meta file for: $file"
              MISSING=$((MISSING + 1))
            fi
          done < <(find Editor -type f \( -name "*.cs" -o -name "*.asmdef" \) -print0)

          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING .meta file(s) missing. Unity requires .meta files for all assets."
            exit 1
          fi

          echo "All source files have corresponding .meta files"
